<body>

<div id="chart-container"></div>
<div id="tooltip"></div>

<!-- Theme picker popover (local-only). The button lives in the editor bar. Populated by src/main.js. -->
<div id="theme-popover" hidden>
  <div class="tp-title">Theme</div>
  <label class="tp-row"><span>Light mode</span><select id="theme-light"></select></label>
  <label class="tp-row"><span>Dark mode</span><select id="theme-dark"></select></label>
  <div id="theme-active" class="tp-active"></div>
  <div class="tp-actions">
    <button id="theme-import-btn">Import&#8230;</button>
    <button id="theme-export-btn">Export active</button>
    <button id="theme-export-all-btn">Export custom</button>
  </div>
  <div id="theme-import-area" hidden>
    <textarea id="theme-import-text" placeholder="Paste theme JSON&#8230;" spellcheck="false"></textarea>
    <div class="tp-actions">
      <label class="tp-file">Choose file<input type="file" id="theme-import-file" accept="application/json,.json" hidden></label>
      <button id="theme-import-apply">Add theme</button>
    </div>
    <div id="theme-import-msg" class="tp-msg"></div>
  </div>
  <div class="tp-note">Themes live only in your browser (localStorage). Nothing is uploaded; import/export is local files only.</div>
</div>

<div id="editor-panel">
  <div id="panel-resizer"></div>
  <div id="panel-header">
    <span id="status-msg">Valid JSON &#x2713;</span>
    <span id="hist-tools">
      <button id="undo-btn" title="Undo (&#8984;Z)" disabled>&#8617;</button>
      <button id="redo-btn" title="Redo (&#8984;&#8679;Z)" disabled>&#8618;</button>
      <button id="history-btn" title="History tree (Ctrl+Y)">&#9202;</button>
      <button id="plans-btn" title="Plans (Ctrl+O)">&#9776;</button>
      <button id="help-btn" title="Keyboard &amp; mouse help (?)">?</button>
    </span>
    <button id="deps-btn" title="Cycle dependency display (d): all → red only → off" style="font-family:'SF Mono',Menlo,monospace;font-size:12px;color:#555;background:#f4f1e8;border:1px solid #ddd;border-radius:3px;padding:2px 8px;cursor:pointer;margin-right:8px;box-sizing:border-box;width:126px;text-align:left;white-space:nowrap">Deps: all</button>
    <label style="font-family:'SF Mono',Menlo,monospace;font-size:12px;color:#555;cursor:pointer;user-select:none;margin-right:8px">
      <input type="checkbox" id="toggle-today" checked style="margin-right:4px;cursor:pointer;vertical-align:-1px">Today line
    </label>
    <label style="font-family:'SF Mono',Menlo,monospace;font-size:12px;color:#555;cursor:pointer;user-select:none;margin-right:8px">
      <input type="checkbox" id="toggle-compact" style="margin-right:4px;cursor:pointer;vertical-align:-1px">Compact 8.5&#8243;
    </label>

>
    <button id="close-btn" title="Close (Ctrl+\)">&times;</button>
  </div>
  <div id="editor-wrap"><textarea id="editor"></textarea></div>
</div>
